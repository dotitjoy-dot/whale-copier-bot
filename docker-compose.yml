version: '3.8'

services:
  bot:
    build: .
    container_name: whale_copy_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('data/whale_bot.db')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bot_network:
    driver: bridge
